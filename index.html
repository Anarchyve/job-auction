<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직업 경매 시스템</title>
</head>
<body>
    <h1>직업 경매</h1>
    <form id="jobForm">
        <label for="name">이름:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="job">직업 선택:</label>
        <select id="job" name="job" required>
            <option value="teacher">Teacher</option>
            <option value="assistant">Assistant</option>
            <option value="manager">Manager</option>
        </select><br><br>

        <label for="wage">희망 임금:</label>
        <input type="number" id="wage" name="wage" required><br><br>

        <button type="submit">제출</button>
    </form>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.20.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.20.0/firebase-firestore.js"></script>

    <!-- Firebase 설정 -->
    <script>
        // Firebase 초기화 설정
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID",
          measurementId: "YOUR_MEASUREMENT_ID"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);

        // Firestore 초기화
        const db = firebase.firestore();
    </script>

    <!-- Firestore 데이터 제출 -->
    <script>
        document.getElementById("jobForm").addEventListener("submit", async (event) => {
            event.preventDefault(); // 폼 제출 시 새로고침 방지

            const name = document.getElementById("name").value;
            const job = document.getElementById("job").value;
            const wage = document.getElementById("wage").value;

            try {
                const docRef = await db.collection("students").add({
                    name: name,
                    chosen_job: job,
                    desired_wage: Number(wage)
                });
                console.log("Document written with ID: ", docRef.id);
                alert("제출되었습니다!");
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("데이터 전송에 실패했습니다.");
            }
        });
    </script>
</body>
</html>
