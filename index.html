<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>직업 경매 시스템</title>
</head>
<body>
    <h1>직업 경매</h1>
    <form id="jobForm">
        <label for="name">이름:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="job">직업 선택:</label>
        <select id="job" name="job" required>
            <option value="teacher">Teacher</option>
            <option value="assistant">Assistant</option>
            <option value="manager">Manager</option>
        </select><br><br>

        <label for="wage">희망 임금:</label>
        <input type="number" id="wage" name="wage" required><br><br>

        <button type="submit">제출</button>
    </form>

    <!-- Firebase SDKs -->
    <!-- 호환성 버전 사용 -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- Firebase Analytics를 사용하려면 아래 SDK도 추가하세요 -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

    <!-- Firebase 초기화 -->
    <script>
        // Firebase 설정 객체
        const firebaseConfig = {
            apiKey: "AIzaSyC1dCqAjGqQ7JRunxsDYCvjqxSTl6NnDE",
            authDomain: "job-auction-91c20.firebaseapp.com",
            projectId: "job-auction-91c20",
            storageBucket: "job-auction-91c20.appspot.com",
            messagingSenderId: "936152405332",
            appId: "1:936152405332:web:0edebc79884405ad9764c1",
            measurementId: "G-B6V5XDECDJ"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        firebase.analytics(); // Analytics를 사용하려면 필요

        // Firestore 초기화
        const db = firebase.firestore();
    </script>

    <!-- Firestore 데이터 제출 -->
    <script>
        document.getElementById("jobForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const job = document.getElementById("job").value;
            const wage = document.getElementById("wage").value;

            db.collection("students").add({
                name: name,
                chosen_job: job,
                desired_wage: Number(wage)
            })
            .then(function(docRef) {
                console.log("Document written with ID: ", docRef.id);
                alert("제출되었습니다!");
            })
            .catch(function(error) {
                console.error("Error adding document: ", error);
                alert("데이터 전송에 실패했습니다.");
            });
        });
    </script>
</body>
</html>
